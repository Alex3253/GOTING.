<section id="team" class="relative overflow-hidden bg-[#0a1628] py-20 lg:py-28">

  <div class="pointer-events-none absolute inset-0 overflow-hidden">
    <div class="absolute -top-40 left-1/2 -translate-x-1/2 h-[500px] w-[800px] rounded-full bg-teal-500/10 blur-3xl"></div>
  </div>

  <div class="relative mx-auto max-w-7xl px-6">

    @if (showHeading()) {
      <div class="reveal mb-14">
        <div class="flex items-center gap-3 mb-4">
          <span class="h-px w-10 bg-teal-400"></span>
          <span class="text-xs font-bold tracking-[0.3em] text-teal-400 uppercase">Las personas detrás</span>
        </div>
        <h2 class="text-4xl sm:text-5xl lg:text-6xl font-black text-white leading-none tracking-tight">
          Nuestro <span class="text-teal-400">Equipo</span>
        </h2>
      </div>
    }

    <div class="flex flex-wrap justify-center gap-8">
      @for (member of team; track member.name) {
        <div class="reveal group relative w-full max-w-sm rounded-3xl border border-slate-200 bg-white overflow-hidden hover:border-teal-400 hover:shadow-2xl hover:shadow-teal-500/10 transition-all duration-500 shadow-sm">

          @if (member.foto) {
            <div class="relative aspect-[4/3] w-full overflow-hidden">
              <img [src]="member.foto" [alt]="member.name"
                class="h-full w-full object-cover object-top group-hover:scale-105 transition-transform duration-700" />
              <div class="absolute inset-0 bg-gradient-to-t from-slate-900/40 to-transparent"></div>
            </div>
          } @else {
            <div class="relative aspect-[4/3] w-full bg-gradient-to-br from-slate-100 to-teal-50 flex items-center justify-center overflow-hidden">
              <div class="flex h-24 w-24 items-center justify-center rounded-full border-2 border-teal-400 bg-teal-50 text-4xl font-black text-teal-600">
                {{ member.name.charAt(0) }}
              </div>
            </div>
          }

          <div class="h-1 w-full bg-gradient-to-r from-teal-500 to-cyan-400"></div>

          <div class="p-7">
            <h3 class="text-lg font-bold text-slate-900">{{ member.name }}</h3>
            @if (member.cip) {
              <span class="mt-1 inline-flex items-center rounded-full bg-teal-50 border border-teal-200 px-3 py-0.5 text-[10px] font-bold tracking-widest uppercase text-teal-700">
                {{ member.cip }}
              </span>
            }
            <p class="mt-2 text-sm font-medium text-slate-500">{{ member.role }}</p>

            <div class="mt-5 pt-5 border-t border-slate-100 flex items-center gap-3">
              <a href="tel:+51942678678"
                class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-teal-100 hover:text-teal-600 transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                </svg>
              </a>
              <a href="mailto:consultas.goting@gmail.com"
                class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-teal-100 hover:text-teal-600 transition-colors">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
              </a>
              <a href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer"
                class="flex h-9 w-9 items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-teal-100 hover:text-teal-600 transition-colors">
                <svg class="h-4 w-4 fill-current" viewBox="0 0 24 24">
                  <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
              </a>
            </div>
          </div>

        </div>
      }
    </div>
  </div>
</section>
