  <!-- Navbar principal -->
  <div class="transition-colors duration-300"
    [class.bg-white]="!transparent()" [class.border-b]="!transparent()" [class.border-slate-100]="!transparent()"
    [class.bg-transparent]="transparent()">
    <div class="mx-auto max-w-7xl px-6">
      <nav class="flex items-center justify-between h-20">

        <a routerLink="/" class="shrink-0">
          <img src="/goting.svg" alt="Goting"
            class="h-16 w-auto object-contain transition-all duration-300 brightness-0"
            [class.invert]="transparent()" />
        </a>

        <ul class="hidden lg:flex items-center gap-1 text-sm font-medium">
          <li><a routerLink="/" [class]="navLinkClass('/', true)">Inicio</a></li>
          <li><a routerLink="/nosotros" [class]="navLinkClass('/nosotros')">Nosotros</a></li>
          <li><a routerLink="/servicios" [class]="navLinkClass('/servicios')">Servicios</a></li>
          <li><a routerLink="/equipo" [class]="navLinkClass('/equipo')">Equipo</a></li>
          <li><a routerLink="/contacto" [class]="navLinkClass('/contacto')">Contacto</a></li>
        </ul>

        <div class="flex items-center gap-3">
          <a routerLink="/contacto"
            class="hidden sm:inline-flex items-center gap-2 rounded-full bg-teal-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-teal-700 transition-colors shadow-sm shadow-teal-600/20">
            Agendar Cita
            <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3" />
            </svg>
          </a>
          <button type="button" aria-label="Abrir menú" (click)="toggleMenu()"
            [class]="menuButtonClass()">
            @if (menuAbierto()) {
              <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            } @else {
              <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
            }
          </button>
        </div>

      </nav>
    </div>
  </div>

  <!-- Menú móvil -->
  @if (menuAbierto()) {
    <div class="lg:hidden border-t border-slate-100 bg-white px-6 py-4 space-y-1">
      <a routerLink="/" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="text-teal-600 bg-teal-50" (click)="cerrarMenu()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-teal-50 hover:text-teal-600 transition-colors">Inicio</a>
      <a routerLink="/nosotros" routerLinkActive="text-teal-600 bg-teal-50" (click)="cerrarMenu()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-teal-50 hover:text-teal-600 transition-colors">Nosotros</a>
      <a routerLink="/servicios" routerLinkActive="text-teal-600 bg-teal-50" (click)="cerrarMenu()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-teal-50 hover:text-teal-600 transition-colors">Servicios</a>
      <a routerLink="/equipo" routerLinkActive="text-teal-600 bg-teal-50" (click)="cerrarMenu()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-teal-50 hover:text-teal-600 transition-colors">Equipo</a>
      <a routerLink="/contacto" routerLinkActive="text-teal-600 bg-teal-50" (click)="cerrarMenu()"
        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-medium text-slate-700 hover:bg-teal-50 hover:text-teal-600 transition-colors">Contacto</a>
      <div class="pt-3 border-t border-slate-100">
        <a routerLink="/contacto" (click)="cerrarMenu()"
          class="flex items-center justify-center gap-2 w-full rounded-full bg-teal-600 px-5 py-3 text-sm font-semibold text-white hover:bg-teal-700 transition-colors">
          Agendar Cita →
        </a>
      </div>
    </div>
  }

</header>
