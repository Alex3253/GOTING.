<section class="relative bg-[#0a1628] border-y border-white/10">
  <div class="mx-auto max-w-7xl px-6 py-20 grid grid-cols-2 lg:grid-cols-4 gap-10 text-center">
    @for (stat of stats; track stat.label) {
      <div class="reveal group">
        <p class="text-5xl sm:text-6xl font-black text-white group-hover:text-teal-400 transition-colors duration-300">{{ stat.value }}</p>
        <div class="mt-3 mx-auto h-px w-8 bg-teal-500/50 group-hover:w-16 transition-all duration-500"></div>
        <p class="mt-3 text-xs font-semibold tracking-[0.2em] text-slate-400 uppercase">{{ stat.label }}</p>
      </div>
    }
  </div>
</section>
